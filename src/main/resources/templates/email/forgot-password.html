<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background-color:#f3f4f6;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;padding:32px 0;">
    <tr>
        <td align="center">
            <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
                <tr><td th:replace="~{email/fragments :: header}"></td></tr>
                <tr>
                    <td style="padding:32px;font-family:Arial,sans-serif;color:#111827;">
                        <h2 style="margin:0 0 12px;font-size:20px;">Reset your password</h2>
                        <p style="font-size:14px;line-height:1.6;color:#4b5563;">
                            We received a request to reset your password. Use the code below to continue.
                        </p>
                        <div style="text-align:center;margin:28px 0;">
                            <span style="display:inline-block;font-size:32px;font-weight:bold;letter-spacing:8px;
                                         color:#111827;background-color:#f3f4f6;padding:16px 24px;border-radius:6px;"
                                  th:text="${otp}">000000</span>
                        </div>
                        <p style="font-size:13px;color:#6b7280;">
                            This code expires in <span th:text="${expiryMinutes}">5</span> minutes.
                            If you didn't request a password reset, you can safely ignore this email -
                            your password will not be changed.
                        </p>
                    </td>
                </tr>
                <tr><td th:replace="~{email/fragments :: footer}"></td></tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
