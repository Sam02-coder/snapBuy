<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background-color:#f3f4f6;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6;padding:32px 0;">
    <tr>
        <td align="center">
            <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">
                <tr><td th:replace="~{email/fragments :: header}"></td></tr>
                <tr>
                    <td style="padding:32px;font-family:Arial,sans-serif;color:#111827;">
                        <h2 style="margin:0 0 12px;font-size:20px;">Your password was changed</h2>
                        <p style="font-size:14px;line-height:1.6;color:#4b5563;">
                            This is a confirmation that the password for your account was just changed.
                            If you made this change, no further action is needed.
                        </p>
                        <p style="font-size:14px;line-height:1.6;color:#b91c1c;">
                            If you did <strong>not</strong> make this change, please contact support immediately
                            and reset your password.
                        </p>
                    </td>
                </tr>
                <tr><td th:replace="~{email/fragments :: footer}"></td></tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
